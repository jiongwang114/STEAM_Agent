<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steam 游戏推荐助手</title>
<style>
:root {
  --bg: #1a1a2e; --surface: #16213e; --surface2: #0f3460;
  --accent: #e94560; --text: #eaeaea; --text-muted: #a0a0b0;
  --user-bubble: #0f3460; --assistant-bubble: #16213e;
  --border: #2a2a4a; --tool-bg: #1a3a1a; --tool-text: #7ecb7e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: row; }

/* Sidebar */
.sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.sidebar-header label { font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 3px; }
.sidebar-header input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 5px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 6px; }
.sidebar-header button { width: 100%; background: var(--accent); color: #fff; border: none; padding: 6px; border-radius: 4px; font-size: 12px; cursor: pointer; }
.sidebar-header button:hover { opacity: 0.9; }
.thread-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
.thread-item { padding: 8px 10px; cursor: pointer; border-radius: 6px; font-size: 12px; margin-bottom: 2px; transition: background 0.15s; }
.thread-item:hover { background: var(--surface2); }
.thread-item.active { background: var(--surface2); border: 1px solid var(--accent); }
.thread-item .id-text { color: var(--text); font-weight: 500; font-family: monospace; }
.thread-item .meta-text { color: var(--text-muted); font-size: 11px; margin-top: 2px; }

/* Chat */
.chat-container { flex: 1; display: flex; flex-direction: column; min-width: 0; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
header h1 { font-size: 16px; font-weight: 600; }
main { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
.message { display: flex; gap: 10px; max-width: 80%; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message.assistant { align-self: flex-start; }
.message.system { align-self: center; max-width: 100%; }
.avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.message.user .avatar { background: var(--accent); }
.message.assistant .avatar { background: var(--surface2); }
.bubble { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
.message.user .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; }
.message.assistant .bubble { background: var(--assistant-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.tool-badge { display: inline-flex; align-items: center; gap: 4px; background: var(--tool-bg); color: var(--tool-text); padding: 3px 8px; border-radius: 10px; font-size: 11px; margin: 3px 3px 3px 0; }
.loading { display: flex; gap: 4px; padding: 10px 14px; }
.loading .dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
.loading .dot:nth-child(1) { animation-delay: -0.32s; }
.loading .dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
footer { background: var(--surface); border-top: 1px solid var(--border); padding: 10px 20px; flex-shrink: 0; }
.input-row { display: flex; gap: 8px; }
.input-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; }
.input-row input:focus { border-color: var(--accent); }
.input-row input::placeholder { color: #555; }
.input-row button { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
.input-row button:hover { opacity: 0.9; }
.input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
.hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; text-align: center; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <label>用户 ID</label>
    <input id="userIdInput" type="text" value="web_user" placeholder="eval_user" />
    <button onclick="refreshThreads()">刷新列表</button>
  </div>
  <div class="thread-list" id="threadList">
    <div style="color:var(--text-muted);font-size:12px;padding:8px;text-align:center">点击"刷新列表"加载历史会话</div>
  </div>
</aside>

<div class="chat-container">
<header>
  <h1>Steam 游戏推荐助手</h1>
  <div>
    <span style="font-size:12px;color:var(--text-muted)">会话: </span>
    <strong id="threadLabel" style="font-size:12px">—</strong>
    <button onclick="newThread()" style="margin-left:12px;background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px">新会话</button>
  </div>
</header>

<main id="chat"></main>

<footer>
  <div class="input-row">
    <input id="input" type="text" placeholder="输入消息..." autofocus onkeydown="if(event.key==='Enter')send()" />
    <button id="sendBtn" onclick="send()">发送</button>
  </div>
  <div class="hint">左侧可查看和切换历史会话 | Agent 自动调用工具</div>
</footer>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const threadLabel = document.getElementById('threadLabel');
const threadList = document.getElementById('threadList');

let threadId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36);
threadLabel.textContent = threadId.slice(0, 8);
let isStreaming = false;

function getUserId() {
  const inp = document.getElementById('userIdInput');
  return inp ? inp.value.trim() || 'web_user' : 'web_user';
}

async function refreshThreads() {
  const uid = getUserId();
  threadList.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px;text-align:center">加载中...</div>';
  try {
    const resp = await fetch('/threads?user_id=' + encodeURIComponent(uid));
    const data = await resp.json();
    if (!data.threads || data.threads.length === 0) {
      threadList.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px;text-align:center">暂无历史会话</div>';
      return;
    }
    threadList.innerHTML = '';
    data.threads.forEach(t => {
      const div = document.createElement('div');
      div.className = 'thread-item' + (t.thread_id === threadId ? ' active' : '');
      div.innerHTML = '<div class="id-text">#' + t.thread_id.slice(0, 12) + '</div>'
        + '<div class="meta-text">' + t.msg_count + ' 条 | ' + (t.last_active || '').slice(0, 16).replace('T', ' ') + '</div>';
      div.onclick = () => loadThread(t.thread_id);
      threadList.appendChild(div);
    });
  } catch (err) {
    threadList.innerHTML = '<div style="color:var(--accent);font-size:12px;padding:8px">加载失败: ' + err.message + '</div>';
  }
}

async function loadThread(tid) {
  threadId = tid;
  threadLabel.textContent = threadId.slice(0, 8);
  chat.innerHTML = '';
  addMessage('system', '加载中...');
  try {
    const resp = await fetch('/messages?user_id=' + encodeURIComponent(getUserId()) + '&thread_id=' + encodeURIComponent(threadId));
    const data = await resp.json();
    chat.innerHTML = '';
    if (!data.messages || data.messages.length === 0) {
      addMessage('system', '该会话暂无消息记录。');
    } else {
      data.messages.forEach(m => addMessage(m.role === 'user' ? 'user' : 'assistant', m.content));
    }
  } catch (err) {
    chat.innerHTML = '';
    addMessage('system', '加载失败: ' + err.message);
  }
  document.querySelectorAll('.thread-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('.id-text')?.textContent?.startsWith('#' + threadId.slice(0, 12)));
  });
  chat.scrollTop = chat.scrollHeight;
}

function newThread() {
  threadId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36);
  threadLabel.textContent = threadId.slice(0, 8);
  chat.innerHTML = '';
  addMessage('system', '新会话已开始');
  document.querySelectorAll('.thread-item').forEach(el => el.classList.remove('active'));
}

function addMessage(role, text, toolNames) {
  const div = document.createElement('div');
  div.className = 'message ' + role;
  if (role === 'system') {
    div.innerHTML = '<div class="bubble" style="color:var(--text-muted);font-size:12px;text-align:center">' + text + '</div>';
  } else {
    div.innerHTML = '<div class="avatar">' + (role === 'user' ? 'U' : 'A') + '</div><div class="bubble">' + text + '</div>';
    if (toolNames && toolNames.length > 0) {
      div.querySelector('.bubble').insertAdjacentHTML('beforeend', '<div style="margin-top:8px">' + toolNames.map(t => '<span class="tool-badge">' + t + '</span>').join('') + '</div>');
    }
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addStreamingMessage() {
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.innerHTML = '<div class="avatar">A</div><div class="bubble"><span class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span></div>';
  div.id = 'streaming-msg';
  chat.appendChild(div);
  return div;
}

async function send() {
  const msg = input.value.trim();
  if (!msg || isStreaming) return;
  isStreaming = true;
  input.value = ''; input.disabled = true; sendBtn.disabled = true;

  addMessage('user', msg);
  const streamDiv = addStreamingMessage();
  const bubble = streamDiv.querySelector('.bubble');
  let fullReply = ''; const tools = [];

  try {
    const resp = await fetch('/chat/stream', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ thread_id: threadId, user_id: getUserId(), message: msg, steam_id: null })
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        const t = line.trim();
        if (!t || !t.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(t.slice(6));
          if (evt.event === 'token') { fullReply += evt.data; bubble.textContent = fullReply; chat.scrollTop = chat.scrollHeight; }
          else if (evt.event === 'tool_call') tools.push(evt.data);
        } catch (_) {}
      }
    }
    bubble.textContent = fullReply || '(无回复)';
    if (tools.length) bubble.insertAdjacentHTML('beforeend', '<div style="margin-top:8px">' + tools.map(t => '<span class="tool-badge">' + t + '</span>').join('') + '</div>');
    streamDiv.removeAttribute('id');
  } catch (err) {
    bubble.innerHTML = '<span style="color:var(--accent)">请求失败: ' + err.message + '</span>';
    streamDiv.removeAttribute('id');
  } finally {
    isStreaming = false;
    input.disabled = false; sendBtn.disabled = false;
    input.focus(); chat.scrollTop = chat.scrollHeight;
  }
}

addMessage('system', '欢迎使用 Steam 游戏推荐助手');
refreshThreads();
</script>
</body>
</html>
